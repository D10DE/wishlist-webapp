<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist Dashboard</title>
    <link rel="stylesheet" href="/app/css/dashboard.css">
    <link rel="stylesheet" href="/app/css/cropper.css">
    <link rel="icon" href="/static/favicon.ico">
</head>
<body>
<div class="app">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <span id="user-display"></span>
            <button id="logout-btn" class="btn btn-sm">Logout</button>
        </div>

        <!-- Tab buttons (vertical) -->
        <nav class="sidebar-nav">
            <button class="sidebar-tab active" data-tab="wishlists">📋 My Wishlists</button>
            <button class="sidebar-tab" data-tab="shared">🔗 Shared Wishlists</button>
            <button class="sidebar-tab" data-tab="bookings">🎁 My Bookings</button>
            <button class="sidebar-tab" data-tab="history">📜 History</button>
        </nav>

        <!-- Wishlist list (only visible when 'wishlists' tab active) -->
        <div id="wishlist-list-container" class="wishlist-list-container">
            <ul id="wishlist-list-sidebar" class="sidebar-list"></ul>
            <button class="btn btn-new" onclick="createWishlist()">+ New Wishlist</button>
        </div>
        <div id="shared-list-container" class="wishlist-list-container">
            <ul id="shared-list-sidebar" class="sidebar-list"></ul>
            <button class="btn btn-new" onclick="openSharedModal()">+ Add Shared</button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main" id="main-content">
        <div class="card">
            <h3>Welcome!</h3>
            <p>Select a wishlist or a tab to start.</p>
        </div>
    </main>
</div>

<!-- Wishlist create/edit modal -->
<div class="modal" id="wishlist-modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('wishlist-modal')">&times;</span>
        <h3 id="wishlist-modal-title">Create Wishlist</h3>
        <form id="wishlist-form">
            <div class="form-group">
                <label>Title</label>
                <input type="text" name="title" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label><input type="checkbox" name="is_public"> Public</label>
            </div>
            <button type="submit" class="btn btn-primary">Save</button>
        </form>
    </div>
</div>
<!-- Edit Wishlist modal -->
<div class="modal" id="edit-wishlist-modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('edit-wishlist-modal')">&times;</span>
        <h3>Edit Wishlist</h3>
        <div class="form-group">
            <label>Title</label>
            <input type="text" id="edit-wishlist-title">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="edit-wishlist-description" rows="3"></textarea>
        </div>
        <button class="btn btn-primary" onclick="submitEditWishlist()">Save</button>
    </div>
</div>
<!-- Item add/edit modal -->
<div class="modal" id="item-modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('item-modal')">&times;</span>
        <h3 id="item-modal-title">Add Item</h3>
        <form id="item-form" enctype="multipart/form-data">
            <input type="hidden" name="item_id" id="edit-item-id">
            <div class="form-group">
                <label>Name *</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="2"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Price</label>
                    <input type="number" step="0.01" name="price">
                </div>
                <div class="form-group">
                    <label>Currency</label>
                    <input type="text" name="currency" value="USD" maxlength="3">
                </div>
            </div>
            <div class="form-group">
                <label>Desired date</label>
                <input type="date" name="desired_date">
            </div>
            <div class="form-group">
                <label>Comment</label>
                <textarea name="comment" rows="2"></textarea>
            </div>
            <div class="form-group">
                <label>Shops</label>
                <div id="shops-container"></div>
                <button type="button" class="btn btn-sm" onclick="addShopRow()">+ Add Shop</button>
            </div>
            <div class="form-group">
                <label>Category</label>
                <select name="category_id" id="item-category-select">
                    <option value="">-- None --</option>
                </select>
            </div>
            <div class="form-group">
                <label>Image</label>
                <input type="file" name="image" accept="image/*">
            </div>
            <div class="form-group">
                <label><input type="checkbox" name="remove_image"> Remove current picture</label>
            </div>
            <button type="submit" class="btn btn-success">Save Item</button>
        </form>
    </div>
</div>

<!-- Category modal -->
<div class="modal" id="category-modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('category-modal')">&times;</span>
        <h3>Add Category</h3>
        <div class="form-group">
            <label>Category name</label>
            <input type="text" id="new-category-name" placeholder="e.g., Electronics">
        </div>
        <button class="btn btn-primary" onclick="submitCategory()">Save</button>
    </div>
</div>

<!-- Shared wishlist modal -->
<div class="modal" id="shared-modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('shared-modal')">&times;</span>
        <h3>Add Shared Wishlist</h3>
        <div class="form-group">
            <label>Paste wishlist ID or full link</label>
            <input type="text" id="shared-uuid-input-modal" placeholder="e.g., a1b2c3d4-...">
        </div>
        <button class="btn btn-primary" onclick="submitSharedWishlist()">View</button>
    </div>
</div>

<!-- Confirmation modal -->
<div class="modal" id="confirm-modal">
    <div class="modal-content">
        <p id="confirm-message"></p>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
            <button class="btn btn-sm" onclick="closeModal('confirm-modal')">Cancel</button>
            <button class="btn btn-danger btn-sm" id="confirm-ok-btn">OK</button>
        </div>
    </div>
</div>

<!-- Alert modal -->
<div class="modal" id="alert-modal">
    <div class="modal-content">
        <p id="alert-message"></p>
        <div style="text-align:right;">
            <button class="btn btn-primary btn-sm" onclick="closeModal('alert-modal')">OK</button>
        </div>
    </div>
</div>

<!-- Crop modal (for image upload) -->
<div class="modal" id="crop-modal">
    <div class="modal-content" style="max-width: 90vw; max-height: 90vh;">
        <span class="close" onclick="closeModal('crop-modal')">&times;</span>
        <h3>Crop Image (1:1)</h3>
        <div style="max-height: 70vh; overflow: hidden;">
            <img id="crop-image" style="max-width: 100%; display: block;">
        </div>
        <div style="margin-top: 10px; display: flex; gap: 10px; justify-content: flex-end;">
            <button class="btn btn-sm" onclick="cancelCrop()">Cancel</button>
            <button class="btn btn-primary btn-sm" onclick="applyCrop()">Crop & Use</button>
        </div>
    </div>
</div>

<script src="/app/js/cropper.js" defer></script>
<script src="/app/js/processImage.js"></script>
<script src="/app/js/dashboard.js" defer></script>

</body>
</html>
